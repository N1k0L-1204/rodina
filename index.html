<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kvíz – Rodinné právo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #533483 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .glass {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  /* ── SCREEN WRAPPERS ── */
  .screen {
    display: none;
    width: 100%;
    max-width: 680px;
    animation: fadeIn .4s ease;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MENU ── */
  #menuScreen .card {
    padding: 52px 48px 40px;
    text-align: center;
    width: 100%;
  }
  .menu-icon { font-size: 3.2rem; margin-bottom: 16px; }
  #menuScreen h1 {
    font-size: 1.7rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 10px;
  }
  #menuScreen p.subtitle {
    color: rgba(255,255,255,0.6);
    font-size: .95rem;
    margin-bottom: 36px;
  }
  .btn-start {
    background: linear-gradient(135deg, #a78bfa, #6366f1);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 56px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 20px rgba(99,102,241,0.45);
    letter-spacing: .5px;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.55); }
  .btn-start:active { transform: translateY(0); }

  /* ── QUIZ ── */
  #quizScreen { gap: 18px; }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 22px;
  }
  .top-bar .label {
    color: rgba(255,255,255,0.6);
    font-size: .82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-badge {
    background: rgba(99,102,241,0.35);
    border: 1px solid rgba(99,102,241,0.5);
    border-radius: 50px;
    padding: 6px 18px;
    color: #fff;
    font-weight: 700;
    font-size: .95rem;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #6366f1);
    border-radius: 99px;
    transition: width .4s ease;
  }

  .question-card {
    width: 100%;
    padding: 36px 40px 32px;
  }
  .q-number {
    font-size: .78rem;
    font-weight: 700;
    color: #a78bfa;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 1.08rem;
    color: #f0f0ff;
    line-height: 1.65;
    font-weight: 400;
  }

  .answer-btns {
    width: 100%;
    display: flex;
    gap: 14px;
  }
  .btn-answer {
    flex: 1;
    padding: 18px 10px;
    border-radius: 16px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .12s;
    letter-spacing: .3px;
  }
  .btn-answer:hover:not(:disabled) {
    background: rgba(255,255,255,0.16);
    border-color: rgba(255,255,255,0.35);
    transform: translateY(-2px);
  }
  .btn-answer:active:not(:disabled) { transform: translateY(0); }

  .btn-answer.correct {
    background: rgba(34,197,94,0.28);
    border-color: #22c55e;
    color: #86efac;
  }
  .btn-answer.wrong {
    background: rgba(239,68,68,0.28);
    border-color: #ef4444;
    color: #fca5a5;
  }
  .btn-answer:disabled { cursor: default; }

  .feedback-box {
    width: 100%;
    padding: 16px 22px;
    border-radius: 16px;
    font-size: .95rem;
    font-weight: 600;
    text-align: center;
    transition: all .3s;
    min-height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .feedback-box.correct {
    background: rgba(34,197,94,0.18);
    border: 1px solid rgba(34,197,94,0.4);
    color: #86efac;
  }
  .feedback-box.wrong {
    background: rgba(239,68,68,0.18);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
  }
  .feedback-box.hidden { opacity: 0; pointer-events: none; }

  .btn-next {
    background: linear-gradient(135deg, #a78bfa, #6366f1);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 15px 40px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, opacity .2s;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    align-self: flex-end;
    margin-right: 0;
    width: 100%;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }
  .btn-next.hidden { opacity: 0; pointer-events: none; }

  /* ── RESULT ── */
  #resultScreen { gap: 18px; }
  .result-card {
    width: 100%;
    padding: 44px 40px 36px;
    text-align: center;
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .result-card h2 { color: #fff; font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .result-card p { color: rgba(255,255,255,0.65); font-size: 1rem; margin-bottom: 6px; }
  .big-score {
    font-size: 3.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 16px 0;
  }
  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }
  .btn-retry, .btn-menu, .btn-wrong-retry {
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn-wrong-retry {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: #fff;
    box-shadow: 0 4px 20px rgba(239,68,68,0.35);
  }
  .btn-wrong-retry:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(239,68,68,0.45); }
  .btn-retry {
    background: linear-gradient(135deg, #a78bfa, #6366f1);
    color: #fff;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
  }
  .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }
  .btn-menu {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff;
  }
  .btn-menu:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
  .btn-wrong-retry.hidden { display: none; }

  /* ── FOOTER NOTE ── */
  .footer-note {
    margin-top: 22px;
    color: rgba(255,255,255,0.35);
    font-size: .78rem;
    text-align: center;
    max-width: 480px;
  }
  .footer-note span { color: rgba(167,139,250,0.7); font-weight: 600; }
</style>
</head>
<body>

<!-- ════════════ MENU ════════════ -->
<div id="menuScreen" class="screen active">
  <div class="card glass">
    <div class="menu-icon">⚖️</div>
    <h1>Otázky na opravný test<br>z rodinného práva</h1>
    <p class="subtitle">Pravda / Nepravda · náhodné poradie · okamžitá spätná väzba</p>
    <button class="btn-start" onclick="startQuiz(false)">▶&nbsp;&nbsp;Štart</button>
  </div>
  <p class="footer-note">Kvíz je vyhotovený vďaka otázkam poskytnutými <span>Majkou</span> 🙏</p>
</div>

<!-- ════════════ QUIZ ════════════ -->
<div id="quizScreen" class="screen">
  <div class="top-bar glass">
    <span class="label" id="qCounter">Otázka 1 / 50</span>
    <span class="score-badge">✅ <span id="scoreNum">0</span> správnych</span>
  </div>
  <div class="progress-wrap" style="max-width:680px;width:100%;">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="question-card glass">
    <p class="q-number" id="qNumber">Výrok #1</p>
    <p class="q-text" id="qText">…</p>
  </div>
  <div class="answer-btns">
    <button class="btn-answer" id="btnTrue"  onclick="answer(true)">✅&nbsp; PRAVDA</button>
    <button class="btn-answer" id="btnFalse" onclick="answer(false)">❌&nbsp; NEPRAVDA</button>
  </div>
  <div class="feedback-box hidden" id="feedbackBox"></div>
  <button class="btn-next hidden" id="btnNext" onclick="nextQuestion()">Ďalšia otázka →</button>
</div>

<!-- ════════════ RESULT ════════════ -->
<div id="resultScreen" class="screen">
  <div class="result-card glass">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <h2 id="resultTitle">Výsledok</h2>
    <p id="resultSub">Dosiahnuté skóre</p>
    <div class="big-score" id="resultScore">0/0</div>
    <p id="resultPct" style="margin-bottom:28px;"></p>
    <div class="result-btns">
      <button class="btn-wrong-retry hidden" id="btnWrongRetry" onclick="startQuiz(true)">🔄&nbsp; Zopakovať nesprávne odpovede</button>
      <button class="btn-retry" onclick="startQuiz(false)">↺&nbsp; Znova (celý kvíz)</button>
      <button class="btn-menu" onclick="goMenu()">🏠&nbsp; Hlavné menu</button>
    </div>
  </div>
  <p class="footer-note">Kvíz je vyhotovený vďaka otázkam poskytnutým <span>Majkou</span> 🙏</p>
</div>

let queue = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let wrongQuestions = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(wrongOnly) {
  queue = shuffle(wrongOnly ? wrongQuestions : ALL_QUESTIONS);
  wrongQuestions = [];
  currentIndex = 0;
  score = 0;
  answered = false;
  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const q = queue[currentIndex];
  const total = queue.length;

  document.getElementById('qCounter').textContent = `Otázka ${currentIndex + 1} / ${total}`;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('qNumber').textContent = `Výrok č. ${q.id}`;
  document.getElementById('qText').textContent = q.text;

  const pct = (currentIndex / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // reset buttons
  const bT = document.getElementById('btnTrue');
  const bF = document.getElementById('btnFalse');
  bT.classList.remove('correct','wrong');
  bF.classList.remove('correct','wrong');
  bT.disabled = false;
  bF.disabled = false;

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box hidden';
  fb.textContent = '';

  document.getElementById('btnNext').classList.add('hidden');
  answered = false;
}

function answer(userSaidTrue) {
  if (answered) return;
  answered = true;

  const q = queue[currentIndex];
  const correct = (userSaidTrue === q.answer);

  const bT = document.getElementById('btnTrue');
  const bF = document.getElementById('btnFalse');
  bT.disabled = true;
  bF.disabled = true;

  if (correct) {
    score++;
    document.getElementById('scoreNum').textContent = score;
    if (userSaidTrue) bT.classList.add('correct');
    else bF.classList.add('correct');
  } else {
    wrongQuestions.push(q);
    if (userSaidTrue) { bT.classList.add('wrong'); bF.classList.add('correct'); }
    else { bF.classList.add('wrong'); bT.classList.add('correct'); }
  }

  // Mark the correct answer visually
  if (q.answer) bT.classList.add('correct');
  else bF.classList.add('correct');

  const fb = document.getElementById('feedbackBox');
  if (correct) {
    fb.className = 'feedback-box correct';
    fb.innerHTML = '✅ Správne!';
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `❌ Nesprávne! Správna odpoveď: <strong>${q.answer ? 'PRAVDA' : 'NEPRAVDA'}</strong>`;
  }

  const btnNext = document.getElementById('btnNext');
  btnNext.classList.remove('hidden');
  if (currentIndex + 1 >= queue.length) {
    btnNext.textContent = 'Zobraziť výsledky 🏁';
  } else {
    btnNext.textContent = 'Ďalšia otázka →';
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= queue.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  const total = queue.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('resultScore').textContent = `${score} / ${total}`;
  document.getElementById('resultPct').textContent = `Úspešnosť: ${pct} %`;

  let emoji, title, sub;
  if (pct === 100)      { emoji='🏆'; title='Perfektný výsledok!';     sub='Všetky odpovede správne. Výborne!'; }
  else if (pct >= 80)   { emoji='🎉'; title='Skvelý výkon!';           sub='Takmer všetko si zvládol/a.'; }
  else if (pct >= 60)   { emoji='👍'; title='Dobrý výsledok';          sub='Stále je čo zlepšovať.'; }
  else if (pct >= 40)   { emoji='📚'; title='Potrebuješ si to ešte prejsť'; sub='Zoopakuj si nesprávne odpovede!'; }
  else                  { emoji='💪'; title='Nevzdávaj sa!';            sub='Prejdi si nesprávne odpovede a skús znova.'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;

  const btnWrong = document.getElementById('btnWrongRetry');
  if (wrongQuestions.length > 0) {
    btnWrong.classList.remove('hidden');
    btnWrong.textContent = `🔄 Zopakovať nesprávne odpovede (${wrongQuestions.length})`;
  } else {
    btnWrong.classList.add('hidden');
  }

  document.getElementById('progressFill').style.width = '100%';
  show('resultScreen');
}

function goMenu() {
  show('menuScreen');
}
</script>
